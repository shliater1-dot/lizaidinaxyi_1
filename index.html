function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

let currentQuestions = [];
let currentIndex = 0;
let isFinished = false;

const dynamicContainer = document.getElementById('dynamicContent');
const questionCounterSpan = document.getElementById('questionCounter');
const progressFill = document.getElementById('progressFill');

function prepareNewTest() {
    let processed = ORIGINAL_QUESTIONS.map(q => {
        const correctAnswerText = q.answers[0];
        let shuffledOptions = shuffleArray([...q.answers]);
        return {
            text: q.text,
            answerOptions: shuffledOptions,
            correctAnswer: correctAnswerText,
            userSelectedIdx: null,
            isAnswered: false
        };
    });
    return shuffleArray(processed);
}

function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

function updateProgress() {
    if (isFinished) {
        const total = currentQuestions.length;
        questionCounterSpan.innerText = '✅ Завершено ' + total + '/' + total;
        progressFill.style.width = '100%';
        return;
    }
    const total = currentQuestions.length;
    const answeredCount = currentQuestions.filter(q => q.isAnswered === true).length;
    questionCounterSpan.innerText = 'Вопрос ' + (currentIndex+1) + '/' + total + ' (отвечено: ' + answeredCount + ')';
    const percent = (answeredCount / total) * 100;
    progressFill.style.width = percent + '%';
}

function selectAnswer(answerIndex) {
    const q = currentQuestions[currentIndex];
    if (q.isAnswered) return;
    
    q.userSelectedIdx = answerIndex;
    q.isAnswered = true;
    
    renderCurrentQuestion();
    updateProgress();
}

function goPrev() {
    if (isFinished) return;
    if (currentIndex > 0) {
        currentIndex--;
        renderCurrentQuestion();
        updateProgress();
    }
}

function goNext() {
    if (isFinished) return;
    
    const q = currentQuestions[currentIndex];
    if (!q.isAnswered) {
        alert('Пожалуйста, выберите вариант ответа');
        return;
    }
    
    if (currentIndex === currentQuestions.length - 1) {
        finishTest();
    } else {
        currentIndex++;
        renderCurrentQuestion();
        updateProgress();
    }
}

function finishTest() {
    isFinished = true;
    renderResultScreen();
    updateProgress();
}

function renderResultScreen() {
    let correctCount = 0;
    for (let i = 0; i < currentQuestions.length; i++) {
        const q = currentQuestions[i];
        if (q.userSelectedIdx !== null) {
            const selectedText = q.answerOptions[q.userSelectedIdx];
            if (selectedText === q.correctAnswer) correctCount++;
        }
    }
    const total = currentQuestions.length;
    const percent = Math.round((correctCount / total) * 100);
    
    let emoji = '';
    if (percent === 100) emoji = '🏆 Идеально!';
    else if (percent >= 70) emoji = '👍 Хороший результат!';
    else if (percent >= 50) emoji = '📚 Неплохо, повторите материал';
    else emoji = '📖 Попробуйте ещё раз';
    
    const resultHtml = '<div class="question-card">' +
        '<div class="question-text" style="font-size: 1.4rem;">📊 Результат теста</div>' +
        '<div class="result-area">' +
        '<div class="result-score">' + correctCount + ' / ' + total + '</div>' +
        '<div style="font-size:1.2rem; margin: 10px 0;">' + percent + '% правильных ответов</div>' +
        '<div style="margin: 5px 0 15px;">' + emoji + '</div>' +
        '<button id="restartFromResultBtn" class="restart-btn">🔄 Пройти тест заново</button>' +
        '</div></div>';
    
    dynamicContainer.innerHTML = resultHtml;
    const restartBtn = document.getElementById('restartFromResultBtn');
    if (restartBtn) restartBtn.addEventListener('click', function() { initTest(); });
}

function renderCurrentQuestion() {
    if (isFinished) {
        renderResultScreen();
        return;
    }
    
    if (!currentQuestions.length) return;
    
    const q = currentQuestions[currentIndex];
    const isAnswered = q.isAnswered;
    
    let answersHtml = '';
    for (let i = 0; i < q.answerOptions.length; i++) {
        let additionalClass = '';
        if (isAnswered) {
            additionalClass = 'disabled-answer';
            if (i === q.userSelectedIdx && q.answerOptions[i] === q.correctAnswer) {
                additionalClass += ' correct-feedback';
            } else if (i === q.userSelectedIdx && q.answerOptions[i] !== q.correctAnswer) {
                additionalClass += ' wrong-feedback';
            } else if (q.answerOptions[i] === q.correctAnswer && q.userSelectedIdx !== null) {
                additionalClass += ' correct-feedback';
            }
        }
        answersHtml += '<div class="answer-option ' + additionalClass + '" data-opt-index="' + i + '">' + escapeHtml(q.answerOptions[i]) + '</div>';
    }
    
    let feedbackNote = '';
    if (isAnswered) {
        const isCorrect = q.answerOptions[q.userSelectedIdx] === q.correctAnswer;
        if (isCorrect) {
            feedbackNote = '<div class="feedback-note" style="background:#dff0e4; border-left-color:#2e7d32;">✅ Верно! Правильный ответ: ' + escapeHtml(q.correctAnswer) + '</div>';
        } else {
            feedbackNote = '<div class="feedback-note" style="background:#ffe6e6; border-left-color:#c62828;">❌ Неверно. Правильный ответ: ' + escapeHtml(q.correctAnswer) + '</div>';
        }
    }
    
    const nextBtnText = (currentIndex === currentQuestions.length - 1) ? '🏁 Завершить' : 'Далее ▶';
    const nextBtnStyle = (currentIndex === currentQuestions.length - 1) ? 'style="background:#2c7da0;"' : '';
    
    const html = '<div class="question-card">' +
        '<div class="question-text">' + escapeHtml(q.text) + '</div>' +
        '<div class="answers-list" id="answersList">' + answersHtml + '</div>' +
        feedbackNote +
        '</div>' +
        '<div class="nav-buttons">' +
        '<button id="prevBtn"' + (currentIndex === 0 ? ' disabled' : '') + '>◀ Назад</button>' +
        '<button id="nextBtn" ' + nextBtnStyle + '>' + nextBtnText + '</button>' +
        '</div>';
    
    dynamicContainer.innerHTML = html;
    
    const answerDivs = document.querySelectorAll('.answer-option');
    for (let i = 0; i < answerDivs.length; i++) {
        answerDivs[i].addEventListener('click', function() {
            if (currentQuestions[currentIndex].isAnswered) return;
            const idx = parseInt(this.getAttribute('data-opt-index'));
            selectAnswer(idx);
        });
    }
    
    const prevButton = document.getElementById('prevBtn');
    if (prevButton) prevButton.addEventListener('click', goPrev);
    
    const nextButton = document.getElementById('nextBtn');
    if (nextButton) nextButton.addEventListener('click', goNext);
}

function initTest() {
    currentQuestions = prepareNewTest();
    currentIndex = 0;
    isFinished = false;
    renderCurrentQuestion();
    updateProgress();
}

initTest();
</script>
